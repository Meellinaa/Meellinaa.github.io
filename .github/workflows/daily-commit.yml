name: Daily Contribution

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update timestamp
        run: |
          echo "Last updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > last-updated.txt

      - name: Commit and push
        run: |
          git config user.name "Meellinaa"
          git config user.email "melina3825@gmail.com"
          git add last-updated.txt
          git commit -m "🌿 Daily update $(date -u '+%Y-%m-%d')"
          git push
